<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Foto-Upload</title>
<style>
  :root {
    --bg: #1c1c1e;
    --surface: #2c2c2e;
    --accent: #0a84ff;
    --accent-active: #0060df;
    --success: #30d158;
    --error: #ff453a;
    --text: #f5f5f7;
    --text-dim: #9a9a9e;
  }

  * { box-sizing: border-box; }

  html, body {
    height: 100%;
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    -webkit-tap-highlight-color: transparent;
    overscroll-behavior: none;
  }

  .screen {
    height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    text-align: center;
  }

  .title {
    font-size: 22px;
    font-weight: 600;
    margin: 0 0 4px;
  }

  .subtitle {
    font-size: 15px;
    color: var(--text-dim);
    margin: 0 0 48px;
  }

  #cameraInput {
    display: none;
  }

  .shutter-btn {
    width: 200px;
    height: 200px;
    border-radius: 50%;
    background: var(--accent);
    border: 6px solid var(--surface);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: transform 0.1s ease, background 0.1s ease;
    touch-action: manipulation;
  }

  .shutter-btn:active {
    transform: scale(0.94);
    background: var(--accent-active);
  }

  .shutter-btn svg {
    width: 72px;
    height: 72px;
    fill: white;
  }

  .status {
    margin-top: 40px;
    min-height: 60px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  .status-text {
    font-size: 17px;
    font-weight: 500;
  }

  .status.uploading .status-text { color: var(--text-dim); }
  .status.success .status-text { color: var(--success); }
  .status.error .status-text { color: var(--error); }

  .spinner {
    width: 22px;
    height: 22px;
    border: 3px solid var(--surface);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .checkmark, .errormark {
    width: 32px;
    height: 32px;
  }

  .retry-btn {
    margin-top: 4px;
    background: none;
    border: none;
    color: var(--accent);
    font-size: 15px;
    padding: 8px 16px;
    cursor: pointer;
  }

  .toast {
    position: fixed;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface);
    color: var(--text);
    padding: 14px 22px;
    border-radius: 14px;
    font-size: 15px;
    font-weight: 500;
    opacity: 0;
    transition: opacity 0.25s ease, transform 0.25s ease;
    pointer-events: none;
    white-space: nowrap;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>
<body>

<div class="screen">
  <p class="title">Foto hochladen</p>
  <p class="subtitle">Tippen und fotografieren</p>

  <label class="shutter-btn" id="shutterBtn">
    <svg viewBox="0 0 24 24"><path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7zM9 2l-1.83 2H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2h-3.17L15 2H9zm3 16a5.5 5.5 0 1 1 0-11 5.5 5.5 0 0 1 0 11z"/></svg>
    <input type="file" id="cameraInput" accept="image/*" capture="environment">
  </label>

  <div class="status" id="status"></div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ==== KONFIGURATION ====
  // Hier die vollständige Flow-URL eintragen (mit sig=... am Ende)
  const FLOW_URL = "https://default327c0eccecd640669fddbcb0a390c5.6e.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/2325a35eb8ad45f1925033a71450a7f7/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=7W7FI5C8iDA22BMLyFxgdgXBafe-5SgurACbDkpmdGw";

  // Optional: Gerätename, falls ihr mehrere iPads unterscheiden wollt.
  // Einfach pro Gerät beim Aufsetzen anpassen, oder leer lassen.
  const DEVICE_NAME = "";
  // ========================

  const input = document.getElementById('cameraInput');
  const status = document.getElementById('status');
  const toast = document.getElementById('toast');

  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2500);
  }

  function setStatus(state, message) {
    status.className = 'status ' + state;
    if (state === 'uploading') {
      status.innerHTML = `<div class="spinner"></div><div class="status-text">${message}</div>`;
    } else if (state === 'success') {
      status.innerHTML = `
        <svg class="checkmark" viewBox="0 0 24 24" fill="none" stroke="#30d158" stroke-width="2.5">
          <circle cx="12" cy="12" r="10"/><path d="M8 12.5l2.5 2.5L16 9.5"/>
        </svg>
        <div class="status-text">${message}</div>`;
      showToast('Foto hochgeladen ✓');
    } else if (state === 'error') {
      status.innerHTML = `
        <svg class="errormark" viewBox="0 0 24 24" fill="none" stroke="#ff453a" stroke-width="2.5">
          <circle cx="12" cy="12" r="10"/><path d="M15 9l-6 6M9 9l6 6"/>
        </svg>
        <div class="status-text">${message}</div>
        <button class="retry-btn" id="retryBtn">Erneut versuchen</button>`;
      document.getElementById('retryBtn').addEventListener('click', () => {
        status.className = 'status';
        status.innerHTML = '';
      });
    } else {
      status.innerHTML = '';
    }
  }

  function fileToBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => {
        // reader.result sieht aus wie "data:image/jpeg;base64,AAAA..."
        // wir brauchen nur den Teil nach dem Komma
        const base64 = reader.result.split(',')[1];
        resolve(base64);
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  input.addEventListener('change', async (event) => {
    const file = event.target.files[0];
    if (!file) return;

    setStatus('uploading', 'Wird hochgeladen …');

    try {
      const base64 = await fileToBase64(file);

      const now = new Date();
      const pad = n => String(n).padStart(2, '0');
      const timestamp = `${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}_${pad(now.getHours())}${pad(now.getMinutes())}${pad(now.getSeconds())}`;
      const prefix = DEVICE_NAME ? `${DEVICE_NAME}_` : '';
      const filename = `${prefix}Foto_${timestamp}.jpg`;

      // Content-Type "text/plain" + mode "no-cors" verhindert, dass der Browser
      // eine CORS-Preflight-Anfrage (OPTIONS) schickt, die Power Automate ablehnt.
      // Der Inhalt bleibt trotzdem gültiges JSON, das der Flow normal verarbeitet.
      await fetch(FLOW_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'text/plain;charset=UTF-8' },
        body: JSON.stringify({ filename, imageBase64: base64 })
      });

      // Hinweis: Im "no-cors"-Modus kann der Browser die tatsächliche Antwort
      // (Status, Inhalt) aus Sicherheitsgründen nicht auslesen. Wenn fetch() hier
      // nicht wirft, wurde die Anfrage erfolgreich gesendet.
      setStatus('success', 'Erfolgreich hochgeladen');

      // Nach kurzer Pause zurück zum Startzustand, bereit für das nächste Foto
      setTimeout(() => setStatus('idle', ''), 2000);

    } catch (err) {
      console.error(err);
      setStatus('error', 'Fehler: ' + err.message);
    } finally {
      // Input zurücksetzen, damit dasselbe Foto erneut ausgelöst werden kann
      input.value = '';
    }
  });
</script>

</body>
</html>
